server {
    listen 80;
    server_name localhost;

    location /bot-api/ {
        proxy_pass http://bot-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 200 'Nexus Chat API Gateway';
        add_header Content-Type text/plain;
    }
}